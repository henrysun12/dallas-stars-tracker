<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stars Tracker</title>
  <link rel="icon" href="img/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-brand">
      <div class="team-selector" id="team-selector">
        <button class="team-selector-btn" id="team-selector-btn">
          <img src="img/star-logo.svg" alt="" class="brand-logo" id="brand-logo">
          <span class="brand-name" id="brand-name">Stars Tracker</span>
          <span class="selector-arrow"></span>
        </button>
        <div class="team-dropdown" id="team-dropdown">
          <button class="team-option active" data-team="stars">
            <img src="img/star-logo.svg" alt="">
            <span>Dallas Stars</span>
            <span class="team-league">NHL</span>
          </button>
          <button class="team-option" data-team="cowboys">
            <img src="https://a.espncdn.com/i/teamlogos/nfl/500/dal.png" alt="">
            <span>Dallas Cowboys</span>
            <span class="team-league">NFL</span>
          </button>
          <button class="team-option" data-team="mavs">
            <img src="https://a.espncdn.com/i/teamlogos/nba/500/dal.png" alt="">
            <span>Dallas Mavericks</span>
            <span class="team-league">NBA</span>
          </button>
          <button class="team-option" data-team="rangers">
            <img src="https://a.espncdn.com/i/teamlogos/mlb/500/tex.png" alt="">
            <span>Texas Rangers</span>
            <span class="team-league">MLB</span>
          </button>
        </div>
      </div>
    </div>
    <nav class="main-nav" id="main-nav">
      <a href="#" class="nav-link active" data-route="">Dashboard</a>
      <a href="#schedule" class="nav-link" data-route="schedule">Schedule</a>
      <a href="#scores" class="nav-link" data-route="scores">Scores</a>
      <a href="#roster" class="nav-link" data-route="roster">Roster</a>
      <a href="#standings" class="nav-link" data-route="standings">Standings</a>
      <a href="#glossary" class="nav-link" data-route="glossary">Glossary</a>
      <a href="#history" class="nav-link" data-route="history">History</a>
      <a href="#draft" class="nav-link" data-route="draft">Draft</a>
      <a href="#rankings" class="nav-link" data-route="rankings">Rankings</a>
      <a href="#clips" class="nav-link" data-route="clips">Clips</a>
    </nav>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div id="stale-banner" class="stale-banner" hidden>
    Showing cached data &mdash; unable to reach servers.
  </div>

  <main id="app-content" class="main-content" tabindex="-1">
  </main>

  <div id="tooltip" class="tooltip" role="tooltip" aria-hidden="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
